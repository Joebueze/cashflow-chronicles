<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashFlow Chronicle — Make Money Online</title>
<meta name="description" content="Practical tips on how to make money online, side hustles, investing, freelancing and passive income strategies.">
<!-- <script src="YOUR_MONETAG_SCRIPT_URL" async></script> -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;
  --accent:#c9a84c;--text:#e8e8e8;--text2:#999;--text3:#555;--border:#2a2a2a;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
a{text-decoration:none;color:inherit}
img{display:block;width:100%;height:100%;object-fit:cover}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:-0.02em}
.logo span{color:var(--accent)}
.nav-links{display:flex;gap:1.5rem;list-style:none;align-items:center}
.nav-links a{color:var(--text2);font-size:0.8rem;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;transition:color 0.2s}
.nav-links a:hover{color:var(--text)}
.nav-cta{background:var(--accent)!important;color:#0f0f0f!important;padding:0.35rem 1rem;border-radius:3px;font-size:0.78rem!important}
.container{max-width:1200px;margin:0 auto;padding:0 2rem}
.cat-bar{border-bottom:1px solid var(--border);background:var(--bg)}
.cat-bar-inner{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.cat-bar-inner::-webkit-scrollbar{display:none}
.cat-btn{padding:0.75rem 1.1rem;font-size:0.78rem;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.cat-btn:hover{color:var(--text)}
.cat-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.main-grid{display:grid;grid-template-columns:1fr 300px;gap:3rem;padding:2.5rem 0}
.featured{margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center;cursor:pointer}
.featured:hover .featured-title{color:var(--accent)}
.featured-img{height:280px;border-radius:4px;overflow:hidden;background:var(--bg3)}
.featured-tag{font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:0.75rem}
.featured-title{font-family:'Playfair Display',serif;font-size:1.8rem;line-height:1.25;margin-bottom:1rem;transition:color 0.2s}
.featured-excerpt{color:var(--text2);font-size:0.9rem;line-height:1.7;margin-bottom:1rem}
.featured-meta{font-size:0.78rem;color:var(--text3)}
.featured-meta span{margin-right:1rem}
.post-card{display:grid;grid-template-columns:1fr 120px;gap:1.25rem;padding:1.25rem 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:start}
.post-card:hover .pc-title{color:var(--accent)}
.post-card:last-child{border-bottom:none}
.pc-tag{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:0.4rem}
.pc-title{font-size:1rem;font-weight:600;line-height:1.4;margin-bottom:0.4rem;transition:color 0.2s}
.pc-excerpt{font-size:0.85rem;color:var(--text2);line-height:1.6;margin-bottom:0.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-meta{font-size:0.75rem;color:var(--text3)}
.pc-meta span{margin-right:0.75rem}
.pc-thumb{height:80px;border-radius:3px;overflow:hidden;background:var(--bg3)}
.sidebar-section{margin-bottom:2.5rem}
.sidebar-title{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);padding-bottom:0.6rem;margin-bottom:1rem}
.trending-item{display:flex;gap:0.75rem;padding:0.75rem 0;border-bottom:1px solid var(--border);cursor:pointer}
.trending-item:hover .ti-title{color:var(--accent)}
.trending-item:last-child{border-bottom:none}
.ti-num{font-size:1.4rem;font-weight:700;color:var(--border);line-height:1;min-width:28px}
.ti-title{font-size:0.85rem;font-weight:500;line-height:1.4;margin-bottom:0.2rem;transition:color 0.2s}
.ti-cat{font-size:0.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em}
.ad-slot{background:var(--bg2);border:1px dashed var(--border);border-radius:4px;padding:1.5rem;text-align:center;margin-bottom:2rem}
.ad-label{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:0.5rem}
.newsletter{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1.25rem}
.nl-title{font-size:0.95rem;font-weight:600;margin-bottom:0.4rem}
.nl-sub{font-size:0.82rem;color:var(--text2);margin-bottom:1rem}
.nl-input{width:100%;padding:0.55rem 0.75rem;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:0.85rem;margin-bottom:0.6rem;outline:none}
.nl-input:focus{border-color:var(--accent)}
.nl-btn{width:100%;padding:0.55rem;background:var(--accent);color:#0f0f0f;border:none;border-radius:3px;font-size:0.85rem;font-weight:600;cursor:pointer}
.skeleton{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.7}}
.skel-card{padding:1.25rem 0;border-bottom:1px solid var(--border)}
.skel-line{height:12px;background:var(--bg3);border-radius:2px;margin-bottom:8px}
.empty{padding:3rem 0;text-align:center;color:var(--text3);font-size:0.9rem}
footer{border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text3);font-size:0.8rem;margin-top:2rem}
@media(max-width:768px){
  .main-grid{grid-template-columns:1fr}
  .featured{grid-template-columns:1fr}
  .featured-img{height:200px}
  .nav-links{display:none}
}
</style>
</head>
<body>
<nav>
  <div class="logo">CashFlow <span>Chronicle</span></div>
  <ul class="nav-links">
    <li><a href="#">Make Money</a></li>
    <li><a href="#">Side Hustles</a></li>
    <li><a href="#">Investing</a></li>
    <li><a href="#">Online Business</a></li>
    <li><a href="#" class="nav-cta">Free Guide</a></li>
  </ul>
</nav>
<div class="cat-bar">
  <div class="container">
    <div class="cat-bar-inner">
      <button class="cat-btn active" onclick="filterCat('all',this)">All Posts</button>
      <button class="cat-btn" onclick="filterCat('Make Money Online',this)">Make Money Online</button>
      <button class="cat-btn" onclick="filterCat('Side Hustles',this)">Side Hustles</button>
      <button class="cat-btn" onclick="filterCat('Freelancing',this)">Freelancing</button>
      <button class="cat-btn" onclick="filterCat('Investing',this)">Investing</button>
      <button class="cat-btn" onclick="filterCat('Passive Income',this)">Passive Income</button>
      <button class="cat-btn" onclick="filterCat('Online Business',this)">Online Business</button>
      <button class="cat-btn" onclick="filterCat('Crypto',this)">Crypto</button>
      <button class="cat-btn" onclick="filterCat('Affiliate Marketing',this)">Affiliate Marketing</button>
    </div>
  </div>
</div>
<div class="container">
  <div class="main-grid">
    <div>
      <div id="featured-section"></div>
      <div id="post-list">
        <div class="skel-card skeleton"><div class="skel-line" style="width:60%;height:14px"></div><div class="skel-line" style="width:90%"></div><div class="skel-line" style="width:75%"></div></div>
        <div class="skel-card skeleton"><div class="skel-line" style="width:50%;height:14px"></div><div class="skel-line" style="width:85%"></div><div class="skel-line" style="width:70%"></div></div>
        <div class="skel-card skeleton"><div class="skel-line" style="width:65%;height:14px"></div><div class="skel-line" style="width:80%"></div><div class="skel-line" style="width:60%"></div></div>
      </div>
    </div>
    <aside>
      <div class="ad-slot">
        <div class="ad-label">Advertisement</div>
        <!-- PASTE ADSTERRA CODE HERE -->
        <div style="color:var(--text3);font-size:0.8rem;margin-top:0.5rem">300×250 Ad Space</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Trending Now</div>
        <div id="trending-list"></div>
      </div>
      <div class="newsletter">
        <div class="nl-title">Get Weekly Money Tips</div>
        <div class="nl-sub">Join readers getting actionable income ideas every Sunday.</div>
        <input class="nl-input" type="email" placeholder="Your email address">
        <button class="nl-btn">Subscribe Free →</button>
      </div>
    </aside>
  </div>
</div>
<footer>© 2026 CashFlow Chronicle · <a href="admin.html" style="color:var(--text3)">Admin</a></footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDzQNQUd5ppfjib6TE0M_New44Hp0uvuP8",
    authDomain: "cashflow-chronicles.firebaseapp.com",
    projectId: "cashflow-chronicles",
    storageBucket: "cashflow-chronicles.firebasestorage.app",
    messagingSenderId: "503268643904",
    appId: "1:503268643904:web:a617fe71e68c58bbdd3ba5"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  let allPosts = [];

  async function loadPosts() {
    try {
      const snap = await db.collection('posts').get();
      allPosts = [];
      snap.forEach(doc => allPosts.push({ id: doc.id, ...doc.data() }));
      allPosts.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      renderAll(allPosts);
    } catch(e) {
      console.error('Firebase error:', e);
      document.getElementById('post-list').innerHTML = '<div class="empty">Could not load posts.</div>';
    }
  }

  function renderAll(posts) {
    renderFeatured(posts);
    renderPosts(posts.slice(1));
    renderTrending(posts);
  }

  function renderFeatured(posts) {
    const sec = document.getElementById('featured-section');
    if (!posts.length) { sec.innerHTML = ''; return; }
    const p = posts[0];
    sec.innerHTML = `
      <div class="featured" onclick="location.href='post.html?id=${p.id}'">
        <div class="featured-img">${p.coverImage ? `<img src="${p.coverImage}" alt="${p.title}" onerror="this.parentElement.style.background='var(--bg3)'">` : ''}</div>
        <div>
          <div class="featured-tag">${p.category || 'Featured'}</div>
          <div class="featured-title">${p.title}</div>
          <div class="featured-excerpt">${p.excerpt || ''}</div>
          <div class="featured-meta"><span>${p.date || ''}</span><span>${p.readTime || 5} min read</span></div>
        </div>
      </div>`;
  }

  function renderPosts(posts) {
    const list = document.getElementById('post-list');
    if (!posts.length) { list.innerHTML = ''; return; }
    list.innerHTML = posts.map(p => `
      <div class="post-card" onclick="location.href='post.html?id=${p.id}'">
        <div>
          <div class="pc-tag">${p.category || 'General'}</div>
          <div class="pc-title">${p.title}</div>
          <div class="pc-excerpt">${p.excerpt || ''}</div>
          <div class="pc-meta"><span>${p.date || ''}</span><span>${p.readTime || 5} min read</span></div>
        </div>
        <div class="pc-thumb">${p.coverImage ? `<img src="${p.coverImage}" alt="${p.title}" onerror="this.parentElement.style.display='none'">` : ''}</div>
      </div>`).join('');
  }

  function renderTrending(posts) {
    document.getElementById('trending-list').innerHTML = posts.slice(0,5).map((p,i) => `
      <div class="trending-item" onclick="location.href='post.html?id=${p.id}'">
        <div class="ti-num">0${i+1}</div>
        <div><div class="ti-title">${p.title}</div><div class="ti-cat">${p.category || ''}</div></div>
      </div>`).join('');
  }

  window.filterCat = function(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = cat === 'all' ? allPosts : allPosts.filter(p => p.category === cat);
    renderFeatured(f);
    renderPosts(f.slice(1));
  };

  loadPosts();
</script>
</body>
</html>
