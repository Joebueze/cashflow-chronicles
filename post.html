*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;--bg4:#2a2a2a;

.nav-subscribe{background:var(--accent);border:none;color:#0f0f0f;padding:0.35rem 0.9rem;border-radius:3px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.progress-bar{position:fixed;top:56px;left:0;width:0%;height:2px;background:var(--accent);z-index:99;transition:width 0.1s linear}
.post-hero{width:100%;max-height:500px;overflow:hidden;position:relative;background:var(--bg3)}
.post-hero img{width:100%;height:500px;object-fit:cover;display:block}
.post-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(15,15,15,0.95) 100%)}
.post-hero-meta{position:absolute;bottom:0;left:0;right:0;padding:2.5rem 2rem 2rem}
.hero-tag{font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:0.75rem}
.post-hero-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.5rem);line-height:1.18;font-weight:700;color:#fff;max-width:760px}

.ad-slot{max-width:var(--max-w);margin:1.5rem auto;padding:0 1.5rem}

.nl-inner{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1.8rem 2rem;text-align:center}

.nl-row{display:flex;gap:0.5rem;max-width:380px;margin:0 auto}
.nl-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:0.55rem 0.85rem;font-size:0.83rem;border-radius:3px;outline:none;font-family:'Inter',sans-serif}
.nl-input:focus{border-color:var(--accent)}
.nl-btn{background:var(--accent);border:none;color:#0f0f0f;padding:0.55rem 1rem;border-radius:3px;font-size:0.8rem;font-weight:600;cursor:pointer}
.related-section{max-width:860px;margin:0 auto;padding:2rem 1.5rem 3rem}
.related-heading{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:1.2rem;padding-bottom:0.7rem;border-bottom:1px solid var(--border)}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.related-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color 0.2s}
.related-card:hover{border-color:var(--accent)}
.related-thumb{height:100px;overflow:hidden;background:var(--bg3)}
.related-thumb img{width:100%;height:100%;object-fit:cover}
.related-body{padding:0.8rem}
.related-tag{font-size:0.64rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:0.3rem;font-weight:600}
.related-title-text{font-size:0.88rem;font-weight:500;line-height:1.35}
.related-time{font-size:0.72rem;color:var(--text3);margin-top:0.4rem}
.back-top{position:fixed;bottom:2rem;right:2rem;background:var(--bg2);border:1px solid var(--border);color:var(--accent);width:40px;height:40px;border-radius:3px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;opacity:0;transition:opacity 0.2s;z-index:50}
.back-top.show{opacity:1}
@media(max-width:640px){
  .related-grid{grid-template-columns:1fr}
  .post-hero img{height:260px}
}
</style>
</head>

<script>
window.addEventListener('scroll',()=>{
  const el=document.documentElement;
  const pct=el.scrollTop/(el.scrollHeight-el.clientHeight)*100;
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('back-top').classList.toggle('show',el.scrollTop>400);
});
function shareTwitter(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(document.title)+'&url='+encodeURIComponent(location.href),'_blank')}
function shareWhatsApp(){window.open('https://wa.me/?text='+encodeURIComponent(document.title+' '+location.href),'_blank')}
function shareFacebook(){window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(location.href),'_blank')}
function copyLink(btn){navigator.clipboard.writeText(location.href).then(()=>{btn.textContent='✓ Copied!';setTimeout(()=>{btn.textContent='🔗 Copy Link';},2000)})}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDzQNQUd5ppfjib6TE0M_New44Hp0uvuP8",
    authDomain: "cashflow-chronicles.firebaseapp.com",
    projectId: "cashflow-chronicles",
    storageBucket: "cashflow-chronicles.firebasestorage.app",
    messagingSenderId: "503268643904",
    appId: "1:503268643904:web:a617fe71e68c58bbdd3ba5"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const postId = new URLSearchParams(location.search).get('id');

  // ✅ Set dynamic canonical tag immediately using postId
  if (postId) {
    const canonicalTag = document.getElementById('canonical-tag');
    if (canonicalTag) {
      canonicalTag.setAttribute('href', 'https://www.cashflow-chronicle.com/post.html?id=' + postId);
    }
  }

  function updateMetaTags(title, description, imageUrl, pageUrl) {
    const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
    document.title = title + ' — CashFlow Chronicle';
    document.querySelector('meta[name="description"]')?.setAttribute('content', description);
    setMeta('meta[property="og:title"]', title);
    setMeta('meta[property="og:description"]', description);
    setMeta('meta[property="og:image"]', imageUrl);
    setMeta('meta[property="og:url"]', pageUrl);
    setMeta('meta[name="twitter:title"]', title);
    setMeta('meta[name="twitter:description"]', description);
    setMeta('meta[name="twitter:image"]', imageUrl);
    // ✅ Also update canonical tag with full post URL
    const canonicalTag = document.getElementById('canonical-tag');
    if (canonicalTag) canonicalTag.setAttribute('href', pageUrl);
    const existing = document.getElementById('post-schema');
    if (existing) existing.remove();
    const schema = document.createElement('script');
    schema.type = 'application/ld+json';
    schema.id = 'post-schema';
    schema.textContent = JSON.stringify({
      "@context":"https://schema.org","@type":"BlogPosting",
      "headline":title,"description":description,"image":imageUrl,"url":pageUrl,
      "publisher":{"@type":"Organization","name":"CashFlow Chronicle","url":"https://www.cashflow-chronicle.com"},
      "author":{"@type":"Organization","name":"CashFlow Chronicle"}
    });
    document.head.appendChild(schema);
  }

  async function loadPost() {
    if (!postId) {
      document.getElementById('post-body').innerHTML = '<p style="color:var(--text3)">No post ID. Go back to homepage and click a post.</p>';
      document.getElementById('hero-section').style.display = 'none';
      return;
    }
    try {
      const snap = await db.collection('posts').doc(postId).get();
      if (!snap.exists) {
        document.getElementById('post-body').innerHTML = '<p style="color:var(--text3)">Post not found.</p>';
        document.getElementById('hero-section').style.display = 'none';
        return;
      }
      const p = snap.data();
      document.getElementById('post-title').textContent    = p.title || '';
      document.getElementById('post-category').textContent = p.category || '';
      document.getElementById('post-date').textContent     = p.date || '';
      document.getElementById('post-readtime').textContent = (p.readTime || 5) + ' min read';
      document.getElementById('post-excerpt').textContent  = p.excerpt || '';
      document.getElementById('post-body').innerHTML       = p.content || '<p>No content.</p>';
      if (p.coverImage) {
        document.getElementById('post-cover').src = p.coverImage;
      } else {
        document.getElementById('hero-section').style.display = 'none';
      }
      document.querySelectorAll('#post-body img').forEach(img => {
        img.setAttribute('loading', 'lazy');
      });
      const pageUrl  = 'https://www.cashflow-chronicle.com/post.html?id=' + postId;
      const imageUrl = p.coverImage || 'https://www.cashflow-chronicle.com/og-image.jpg';
      updateMetaTags(p.title || 'CashFlow Chronicle', (p.excerpt||'').slice(0,155), imageUrl, pageUrl);
      loadRelated(postId);
    } catch(e) {
      console.error('Post load error:', e);
      document.getElementById('post-body').innerHTML = '<p style="color:var(--text3)">Error loading post: ' + e.message + '</p>';
      document.getElementById('hero-section').style.display = 'none';
    }
  }

  async function loadRelated(currentId) {
    try {
      const snap = await db.collection('posts').limit(10).get();
      const posts = [];
      snap.forEach(d => { if (d.id !== currentId) posts.push({id:d.id,...d.data()}); });
      const grid = document.getElementById('related-grid');
      if (!posts.length) { grid.innerHTML = '<p style="color:var(--text3);font-size:0.85rem">No other posts yet.</p>'; return; }
      grid.innerHTML = posts.slice(0,3).map(r => `
        <div class="related-card" onclick="location.href='post.html?id=${r.id}'">
          <div class="related-thumb">${r.coverImage ? `<img src="${r.coverImage}" alt="${r.title}" loading="lazy" onerror="this.parentElement.style.background='var(--bg3)'">` : ''}</div>
          <div class="related-body">
            <div class="related-tag">${r.category||''}</div>
            <div class="related-title-text">${r.title}</div>
            <div class="related-time">${r.readTime||5} min read</div>
          </div>
        </div>`).join('');
    } catch(e) { console.warn('Related error:', e); }
  }
  loadPost();
</script>
